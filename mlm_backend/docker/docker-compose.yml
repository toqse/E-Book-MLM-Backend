services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: mlm_db
      MYSQL_USER: mlm_user
      MYSQL_PASSWORD: mlm_pass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      exec gunicorn config.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --worker-class gthread
      --threads 4
      --timeout 120
      --graceful-timeout 30
      --keep-alive 5
      --access-logfile -
      --error-logfile -"
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      DB_NAME: mlm_db
      DB_USER: mlm_user
      DB_PASSWORD: mlm_pass
      REDIS_URL: redis://redis:6379/0
      USE_SQLITE: "false"
      USE_INSECURE_COOKIES: "1"
      SERVE_MEDIA: "1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A config worker -l info
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      DB_NAME: mlm_db
      DB_USER: mlm_user
      DB_PASSWORD: mlm_pass
      REDIS_URL: redis://redis:6379/0
      USE_SQLITE: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - media_data:/app/media

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A config beat -l info
    env_file:
      - ../.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DB_HOST: db
      DB_NAME: mlm_db
      DB_USER: mlm_user
      DB_PASSWORD: mlm_pass
      REDIS_URL: redis://redis:6379/0
      USE_SQLITE: "false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - media_data:/app/media

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web

volumes:
  mysql_data:
  media_data: